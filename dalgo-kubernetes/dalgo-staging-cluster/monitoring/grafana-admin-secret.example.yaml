# Template for the Grafana admin secret (kube-prometheus-stack, dalgo-staging-cluster).
# Usage:
#   cp grafana-admin-secret.example.yaml grafana-admin-secret.yaml
#   # edit grafana-admin-secret.yaml -> set a strong admin-password
#   kubectl apply -f grafana-admin-secret.yaml
# The real grafana-admin-secret.yaml is gitignored (never committed).
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: monitoring
type: Opaque
stringData:
  admin-user: admin
  admin-password: CHANGE_ME
